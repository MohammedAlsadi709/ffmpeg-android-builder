name: Build FFmpeg AAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧰 Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget unzip yasm pkg-config

      - name: 📦 Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: 📥 Clone FFmpeg 4.4
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git
          cd FFmpeg
          git checkout n4.4

      - name: ⚙️ Give permission to build script
        run: chmod +x build.sh

      - name: 🔨 Build FFmpeg
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_HOME
          ./build.sh

      - name: 📤 Upload .so files
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-so
          path: build/
