#!/bin/bash
set -e

# ========== إعدادات ==========
API=21
NDK=$ANDROID_NDK_HOME
TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

FFMPEG_DIR=$(pwd)/FFmpeg
BUILD_DIR=$(pwd)/build

mkdir -p $BUILD_DIR

# ========== فلاغز مخصصة (تصغير الحجم) ==========
COMMON_FLAGS="
--disable-everything
--enable-small
--enable-shared
--disable-static
--disable-doc
--disable-programs
--disable-avdevice
--disable-postproc
--disable-network

--enable-avcodec
--enable-avformat
--enable-avfilter
--enable-swresample

# decoders / encoders
--enable-decoder=mp3,aac
--enable-encoder=mp3,aac

# filters (حسب استخدامك)
--enable-filter=volume
--enable-filter=apulsator
--enable-filter=atrim
--enable-filter=concat
--enable-filter=amix
--enable-filter=adelay
"

# ========== دالة البناء ==========
build_ffmpeg () {

  ARCH=$1
  CPU=$2
  TARGET=$3

  PREFIX=$BUILD_DIR/$TARGET

  echo "🔥 Building for $TARGET ..."

  cd $FFMPEG_DIR
  make clean || true

  ./configure \
    --prefix=$PREFIX \
    --target-os=android \
    --arch=$ARCH \
    --cpu=$CPU \
    --enable-cross-compile \
    --sysroot=$TOOLCHAIN/sysroot \
    --cc=$TOOLCHAIN/bin/${TARGET}${API}-clang \
    --cxx=$TOOLCHAIN/bin/${TARGET}${API}-clang++ \
    --ld=$TOOLCHAIN/bin/ld \
    --strip=$TOOLCHAIN/bin/llvm-strip \
    --extra-cflags="-Os -fPIC" \
    --extra-ldflags="-Wl,-z,max-page-size=16384" \
    $COMMON_FLAGS

  make -j$(nproc)
  make install

  echo "✅ Done $TARGET"
}

# ========== بناء المعماريات ==========
build_ffmpeg arm armv7a armv7a-linux-androideabi
build_ffmpeg aarch64 aarch64 aarch64-linux-android

echo "🎉 BUILD FINISHED"
