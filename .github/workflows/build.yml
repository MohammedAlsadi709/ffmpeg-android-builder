#!/bin/bash
set -e

API=21
NDK=$ANDROID_NDK_HOME
TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

build_armv7() {
  PREFIX=$(pwd)/output/armeabi-v7a

  cd ffmpeg
  make distclean || true

  ./configure \
    --prefix=$PREFIX \
    --target-os=android \
    --arch=arm \
    --cpu=armv7-a \
    --cc=$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang \
    --cxx=$TOOLCHAIN/bin/armv7a-linux-androideabi${API}-clang++ \
    --enable-cross-compile \
    --enable-shared \
    --disable-static \
    --disable-programs \
    --disable-doc \
    --disable-everything \
    \
    --enable-avcodec \
    --enable-avformat \
    --enable-avfilter \
    --enable-swresample \
    \
    --enable-filter=volume \
    --enable-filter=apulsator \
    --enable-filter=concat \
    --enable-filter=atrim \
    --enable-filter=amix \
    \
    --enable-decoder=mp3 \
    --enable-encoder=mp3 \
    \
    --enable-protocol=file \
    \
    --extra-cflags="-Os -fPIC" \
    --extra-ldflags="-Wl,-z,max-page-size=16384"

  make -j$(nproc)
  make install
  cd ..
}

build_arm64() {
  PREFIX=$(pwd)/output/arm64-v8a

  cd ffmpeg
  make distclean || true

  ./configure \
    --prefix=$PREFIX \
    --target-os=android \
    --arch=aarch64 \
    --cc=$TOOLCHAIN/bin/aarch64-linux-android${API}-clang \
    --cxx=$TOOLCHAIN/bin/aarch64-linux-android${API}-clang++ \
    --enable-cross-compile \
    --enable-shared \
    --disable-static \
    --disable-programs \
    --disable-doc \
    --disable-everything \
    \
    --enable-avcodec \
    --enable-avformat \
    --enable-avfilter \
    --enable-swresample \
    \
    --enable-filter=volume \
    --enable-filter=apulsator \
    --enable-filter=concat \
    --enable-filter=atrim \
    --enable-filter=amix \
    \
    --enable-decoder=mp3 \
    --enable-encoder=mp3 \
    \
    --enable-protocol=file \
    \
    --extra-cflags="-Os -fPIC" \
    --extra-ldflags="-Wl,-z,max-page-size=16384"

  make -j$(nproc)
  make install
  cd ..
}

echo "🔨 Building armeabi-v7a..."
build_armv7

echo "🔨 Building arm64-v8a..."
build_arm64

echo "✅ DONE — both ABIs built"
