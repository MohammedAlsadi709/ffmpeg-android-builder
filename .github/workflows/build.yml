#!/bin/bash

set -e

API=21
NDK=$ANDROID_NDK_HOME
TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64

build() {
  ARCH=$1
  TARGET=$2

  PREFIX=$(pwd)/output/$ARCH

  cd ffmpeg

  make distclean || true

  ./configure \
    --prefix=$PREFIX \
    --target-os=android \
    --arch=$ARCH \
    --cc=$TOOLCHAIN/bin/${TARGET}${API}-clang \
    --cxx=$TOOLCHAIN/bin/${TARGET}${API}-clang++ \
    --enable-cross-compile \
    --enable-shared \
    --disable-static \
    --disable-programs \
    --disable-doc \
    --disable-everything \
    \
    --enable-avcodec \
    --enable-avformat \
    --enable-avfilter \
    --enable-swresample \
    \
    --enable-filter=volume \
    --enable-filter=apulsator \
    --enable-filter=concat \
    --enable-filter=atrim \
    --enable-filter=amix \
    \
    --enable-decoder=mp3 \
    --enable-encoder=mp3 \
    \
    --enable-protocol=file \
    \
    --enable-small \
    \
    --extra-cflags="-Os -fPIC" \
    --extra-ldflags="-Wl,-z,max-page-size=16384"

  make -j$(nproc)
  make install

  cd ..
}

# ARM64
build arm64-v8a aarch64-linux-android

# ARMv7
build armeabi-v7a armv7a-linux-androideabi

echo "✅ Build finished for all ABIs"
